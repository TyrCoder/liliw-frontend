<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B3D91">
  <title>Offline — Liliw Tourism</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0B3D91 0%, #1565C0 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: white; border-radius: 20px; padding: 48px 32px;
      text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    }
    .icon { font-size: 64px; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    h1 { color: #0B3D91; font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    .subtitle { color: #64748b; font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
    .cached {
      background: rgba(11,61,145,0.06); border-left: 3px solid #F5C518;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 28px; text-align: left;
    }
    .cached strong { color: #0B3D91; font-size: 13px; display: block; margin-bottom: 8px; }
    .cached ul { list-style: none; }
    .cached li { color: #374151; font-size: 13px; padding: 2px 0; }
    .cached li::before { content: '✓ '; color: #F5C518; font-weight: bold; }
    .actions { display: flex; gap: 10px; flex-direction: column; }
    .btn-primary {
      padding: 13px 24px; border-radius: 12px; font-size: 15px; font-weight: 700;
      text-decoration: none; background: #0B3D91; color: #F5C518;
      display: block; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      padding: 13px 24px; border-radius: 12px; font-size: 15px; font-weight: 600;
      border: 2px solid #0B3D91; color: #0B3D91; background: transparent;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-secondary:hover { background: rgba(11,61,145,0.06); }
    .note { color: #9CA3AF; font-size: 12px; margin-top: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p class="subtitle">No internet connection detected. Pages you've already visited are still available below.</p>
    <div class="cached">
      <strong>Available offline:</strong>
      <ul>
        <li>Home</li>
        <li>Stories</li>
        <li>Attractions</li>
        <li>News &amp; Events</li>
        <li>Heritage &amp; Culture</li>
        <li>FAQ</li>
      </ul>
    </div>
    <div class="actions">
      <a href="/" class="btn-primary">Go to Home</a>
      <button class="btn-secondary" onclick="window.location.reload()">Try Again</button>
    </div>
    <p class="note">Map and virtual tours require an active internet connection.</p>
  </div>
</body>
</html>
